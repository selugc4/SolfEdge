<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <ion-item *ngIf="!isAdministrator">
        <ion-label>Grupo</ion-label>
        <ion-select [(ngModel)]="selectedGrupo" (ionChange)="onGrupoChange($event)">
          <ion-select-option *ngFor="let grupo of grupos" [value]="grupo">{{ grupo.nombre }}</ion-select-option>
        </ion-select>
      </ion-item>
      <ion-menu-toggle auto-hide="false">
        <ion-item button [routerLink]="['/admin']" routerDirection="root" *ngIf="isAdministrator">
          <ion-icon name="briefcase-sharp" slot="start"></ion-icon>
          <ion-label>Administración</ion-label>
        </ion-item>
        <ion-item button (click)="presentAdminModal()" *ngIf="isAdminOrProfessor && !isAdministrator">
          <ion-icon name="briefcase-sharp" slot="start"></ion-icon>
          <ion-label>Administración</ion-label>
        </ion-item>
        <ion-item button [routerLink]="['/notificaciones']" routerDirection="root" *ngIf="!isAdministrator">
          <ion-icon name="notifications-sharp" slot="start"></ion-icon>
          <ion-label>Notificaciones</ion-label>
        </ion-item>
        <ion-item button (click)="logout()">
          <ion-icon name="log-out-sharp" slot="start"></ion-icon>
          <ion-label>Cerrar Sesión</ion-label>
        </ion-item>
      </ion-menu-toggle>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>

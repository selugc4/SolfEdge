<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      @if(!isAdministrator){
        <ion-item button (click)="openGroupSelect()">
          <ion-icon name="people-sharp" slot="start"></ion-icon>
          <ion-label>Grupo</ion-label>
          <div slot="end">{{ selectedGrupo?.nombre }}</div>
        </ion-item>
      }
      <ion-select #groupSelect [(ngModel)]="selectedGrupo" (ionChange)="onGrupoChange($event)" [compareWith]="compareGrupos" style="display: none;" [interfaceOptions]="groupSelectInterfaceOptions">
        @for(grupo of grupos; track i; let i = $index){
          <ion-select-option [value]="grupo">{{ grupo.nombre }}</ion-select-option>
        }
      </ion-select>
      <ion-menu-toggle auto-hide="false">
        @if(isAdministrator){
          <ion-item button [routerLink]="['/Admin']" routerDirection="root">
            <ion-icon name="briefcase-sharp" slot="start"></ion-icon>
            <ion-label>Administración</ion-label>
          </ion-item>
        }
        @if(isAdminOrProfessor && !isAdministrator){
        <ion-item button [routerLink]="['/Areas/Professor-admin']" routerDirection="root">
          <ion-icon name="briefcase-sharp" slot="start"></ion-icon>
          <ion-label>Administración</ion-label>
        </ion-item>
        }
        @if(!isAdministrator){
          <ion-item button [routerLink]="['/Areas/Mensajes']" routerDirection="root">
            <ion-icon name="mail-sharp" slot="start"></ion-icon>
            <ion-label>Mensajes</ion-label>
          </ion-item>
        }
        <ion-item button (click)="logout()">
          <ion-icon name="log-out-sharp" slot="start"></ion-icon>
          <ion-label>Cerrar Sesión</ion-label>
        </ion-item>
      </ion-menu-toggle>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>

<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Notificaciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="notificaciones.length > 0; else noNotificaciones">
    <ion-item *ngFor="let notificacion of notificaciones" [class.leida]="notificacion.leida" (click)="marcarComoLeida(notificacion)">
      <ion-icon slot="start" [name]="notificacion.leida ? 'mail-open-outline' : 'mail-outline'"></ion-icon>
      <ion-label>
        <h2>{{ notificacion.asunto }}</h2>
        <p>{{ notificacion.mensaje }}</p>
        <p><small>{{ notificacion.createdAt | date:'short' }}</small></p>
      </ion-label>
    </ion-item>
  </ion-list>
  <ng-template #noNotificaciones>
    <ion-card>
      <ion-card-content>
        <p>No tienes notificaciones.</p>
      </ion-card-content>
    </ion-card>
  </ng-template>
</ion-content>

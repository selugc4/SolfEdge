<ion-card>
  <ion-card-header>
    <ion-card-title>Gestión de Grupos</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-item>
      <ion-label position="floating">Nombre del grupo</ion-label>
      <ion-input color="medium" [(ngModel)]="nombreGrupo" type="text" pattern="^[a-zA-Z0-9_-]*$" (ionInput)="onNombreGrupoInput($event)" maxlength="5"></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top" (click)="openSelectAlumnosModal()" color="medium">
      <ion-icon name="options-outline" slot="start"></ion-icon>
      Seleccionar Alumnos ({{ selectedAlumnos.length }})
    </ion-button>
    @if(selectedAlumnos.length > 0){
      <ion-list>
        <ion-list-header>
          <ion-label>Alumnos Seleccionados</ion-label>
        </ion-list-header>
        @for(alumno of selectedAlumnos; ; track i; let i = $index) {
          <ion-item>
            <ion-label>
              <h2>{{ alumno.username }}</h2>
              <p>{{ alumno.email }}</p>
            </ion-label>
            <ion-button slot="end" fill="clear" color="danger" (click)="removeAlumno(alumno)">
              <ion-icon name="close-circle-outline"></ion-icon>
            </ion-button>
          </ion-item>
        }
      </ion-list>
    }
    <ion-button expand="block" class="ion-margin-top" (click)="crearGrupo()" [disabled]="!nombreGrupo || selectedAlumnos.length === 0" color="medium">
      <ion-icon name="add-circle-outline" slot="start"></ion-icon>
      Crear Grupo
    </ion-button>
  </ion-card-content>
</ion-card>

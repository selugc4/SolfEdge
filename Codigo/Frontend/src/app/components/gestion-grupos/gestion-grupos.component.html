<ion-card>
  <ion-card-header>
    <ion-card-title>Gestión de Grupos</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-item>
      <ion-input label="Nombre del Grupo" labelPlacement="floating" [(ngModel)]="nombreGrupo" type="text" pattern="^[a-zA-Z0-9_-]*$" (ionInput)="onNombreGrupoInput($event)" maxlength="20"></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top" (click)="openSelectAlumnosModal()">
      Seleccionar Alumnos ({{ selectedAlumnos.length }})
    </ion-button>

    <ion-list *ngIf="selectedAlumnos.length > 0">
      <ion-list-header>
        <ion-label>Alumnos Seleccionados</ion-label>
      </ion-list-header>
      <ion-item *ngFor="let alumno of selectedAlumnos">
        <ion-label>{{ alumno.username }} ({{ alumno.email }})</ion-label>
        <ion-button slot="end" fill="clear" color="danger" (click)="removeAlumno(alumno)">
          <ion-icon name="close-circle-outline"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <ion-button expand="block" class="ion-margin-top" (click)="crearGrupo()" [disabled]="!nombreGrupo || selectedAlumnos.length === 0">
      Crear Grupo
    </ion-button>
  </ion-card-content>
</ion-card>

<ion-header>
  <ion-toolbar>
    <ion-title>Calificación General</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <ion-item>
      <ion-label position="floating">ID de Alumno</ion-label>
      <ion-input formControlName="alumnoId"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Nota (0-10)</ion-label>
      <ion-input formControlName="nota" type="number"></ion-input>
    </ion-item>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="confirm()" [strong]="true">Guardar Calificación</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>

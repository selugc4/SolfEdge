<ion-header>
  <ion-toolbar>
    <ion-title>{{ tarea ? 'Editar' : 'Nueva' }} Tarea</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <ion-item>
      <ion-label position="floating">Título</ion-label>
      <ion-input formControlName="titulo"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Descripción</ion-label>
      <ion-textarea formControlName="descripcion"></ion-textarea>
    </ion-item>
    <ion-item>
      <ion-label>Fecha Límite</ion-label>
      <ion-datetime-button datetime="fechaLimitePicker"></ion-datetime-button>
      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime id="fechaLimitePicker" presentation="date" formControlName="fechaLimite"></ion-datetime>
        </ng-template>
      </ion-modal>
    </ion-item>

    <ion-item>
      <ion-label>Alumnos</ion-label>
      <ion-select formControlName="alumnos" multiple="true">
        <ion-select-option *ngFor="let alumno of alumnos" [value]="alumno._id">{{ alumno.username }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item class="ion-margin-top">
      <ion-label>Material de Apoyo (PDF, MP3, MP4)</ion-label>
      <input type="file" (change)="onFileSelected($event)" accept=".pdf,.mp3,.mp4">
    </ion-item>
    <ion-button expand="block" (click)="uploadMaterial()" [disabled]="!selectedFile" class="ion-margin-top">
      Subir Material
    </ion-button>
    <p *ngIf="materialDeApoyoId">Material subido: {{ materialDeApoyoId }}</p>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="confirm()" [strong]="true">{{ tarea ? 'Guardar' : 'Crear' }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>

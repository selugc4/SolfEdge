<ion-header>
  <ion-toolbar>
    <ion-title>Entregar Tarea</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cancelar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <ion-item>
      <ion-label position="floating">Comentario (opcional)</ion-label>
      <ion-textarea formControlName="comentario"></ion-textarea>
    </ion-item>

    <ion-item class="ion-margin-top">
      <ion-label>Archivo (PDF, MP3, MP4)</ion-label>
      <input type="file" (change)="onFileSelected($event)" accept=".pdf,.mp3,.mp4">
    </ion-item>
    <ion-button expand="block" (click)="uploadMaterial()" [disabled]="!selectedFile" class="ion-margin-top">
      Subir Archivo
    </ion-button>
    <p *ngIf="materialEntregadoId">Archivo subido: {{ materialEntregadoId }}</p>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="confirm()" [strong]="true">Entregar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
